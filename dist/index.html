  <script>
    // Notion OAuth Proxy Handshake
    (function () {
      const params = new URLSearchParams(window.location.search);
      const code = params.get('code');
      const state = params.get('state');
      // 'state' in our case is the extension ID
      if (code && state && state.length > 20 && !state.includes(' ')) {
        console.log('[Proxy] Notion Auth detected. Bouncing to extension...');
        window.location.href = `chrome-extension://${state}/src/options/index.html?notion_code=${code}`;
      }
    })();
  </script>
